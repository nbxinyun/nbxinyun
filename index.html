<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>锯条成本核算</title>
  <link rel="stylesheet" href="style.css">
  <!-- PWA配置：添加到桌面 -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="锯条成本核算">
  <meta name="theme-color" content="#07c160">
  <style>
    /* 新增样式：让标题和链接同行显示 */
    .title-wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .freight-link {
      font-size: 14px;
      color: #07c160;
      text-decoration: none;
    }
    .freight-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 标题区域修改：新增包裹容器，添加运费计算链接 -->
    <div class="title-wrap">
      <div class="title">锯条成本核算</div>
      <a href="https://nbxinyun.github.io/gangdai/" target="_blank" class="freight-link">运费估算</a>
    </div>

    <!-- 核心输入区 -->
    <div class="input-section">
      <!-- 产品规格 -->
      <div class="form-item">
        <span>产品规格：</span>
        <input type="text" id="spec" placeholder="例：7520*55*0.95*18">
      </div>
      <!-- 规格历史记录 -->
      <div id="specHistoryWrap" class="history-wrap" style="display: none;">
        <div class="history-list" id="specHistory"></div>
      </div>

      <!-- 销售价 -->
<div class="form-item sale-price-item"> <!-- 新增sale-price-item类 -->
  <span>销售价：</span>
  <input type="number" id="salePricePerMeter" placeholder="元/米">
  <span class="unit">元/米</span>
  <span class="sale-price-separator">/</span> <!-- 新增separator类 -->
  <input type="number" id="salePricePerPiece" placeholder="元/条">
  <span class="unit">元/条</span>
</div>
<!-- 销售价历史记录（保留，适配新输入框） -->
<div id="priceHistoryWrap" class="history-wrap" style="display: none;">
  <div class="history-list" id="priceHistory"></div>
</div>
    </div>

    <!-- 材料配置区 -->
    <div class="material-section">
      <div class="material-title">材料配置</div>
      <div class="material-grid">
        <!-- 合金单价 -->
        <div class="material-item">
          <span>合金单价</span>
          <input type="number" id="alloyPrice" placeholder="2250">
          <span class="unit">元/kg</span>
        </div>
        <!-- 合金单价历史 -->
        <div id="alloyHistoryWrap" class="history-wrap material-history" style="display: none;">
          <div class="history-list" id="alloyHistory"></div>
        </div>

        <!-- 合金型号选择 -->
        <div class="material-item">
          <span>合金型号</span>
          <select id="alloyType">
            <option value="6000">1.8合金</option>
            <option value="5280">2.0合金</option>
            <option value="3824">2.4合金</option>
            <option value="3250">2.8合金</option>
            <option value="custom">其他（自定义）</option>
          </select>
        </div>
        <!-- 自定义粒数 -->
        <div id="customTeethWrap" class="material-item" style="display: none;">
          <span>自定义粒数</span>
          <input type="number" id="customTeeth" placeholder="输入粒数">
          <span class="unit">粒/kg</span>
        </div>

        <!-- 焊丝单价 -->
        <div class="material-item">
          <span>焊丝单价</span>
          <input type="number" id="wirePrice" placeholder="6200">
          <span class="unit">元/kg</span>
        </div>
        <!-- 焊丝单价历史 -->
        <div id="wireHistoryWrap" class="history-wrap material-history" style="display: none;">
          <div class="history-list" id="wireHistory"></div>
        </div>

        <!-- 基带单价 -->
        <div class="material-item">
          <span>基带单价</span>
          <input type="number" id="basePrice" placeholder="11.0">
          <span class="unit">元/kg</span>
        </div>
        <!-- 基带单价历史 -->
        <div id="baseHistoryWrap" class="history-wrap material-history" style="display: none;">
          <div class="history-list" id="baseHistory"></div>
        </div>
      </div>
    </div>

    <!-- 计算结果区 -->
    <div id="resultSection" class="result-section" style="display: none;">
      <div class="result-title">计算结果</div>
      <div class="result-item" id="specResult"></div>
      <div class="result-item total-cost" id="totalCost"></div>
      <div class="result-item profit" id="profit"></div>
      <div class="suggest-price" id="suggestPrice"></div>
	<div class="result-item" id="dailyOutput"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
